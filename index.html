<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BelajarAI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Arial,sans-serif;
}

body{
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:95%;
max-width:900px;
height:95vh;
background:#1e293b;
border-radius:20px;
overflow:hidden;
display:flex;
flex-direction:column;
box-shadow:0 0 20px rgba(0,0,0,.4);
}

.header{
background:#111827;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.header h2{
font-size:24px;
}

.header select{
padding:8px;
border-radius:8px;
border:none;
}

.chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
background:#0f172a;
}

.user{
align-self:flex-end;
background:#2563eb;
color:white;
padding:12px;
border-radius:15px;
max-width:75%;
}

.ai{
align-self:flex-start;
background:#334155;
color:white;
padding:12px;
border-radius:15px;
max-width:75%;
}

.bottom{
display:flex;
padding:15px;
background:#111827;
gap:10px;
}

.bottom input{
flex:1;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
}

.bottom button{
padding:14px 25px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
transition:.3s;
}

.bottom button:hover{
background:#1d4ed8;
}

.loading{
opacity:.7;
font-style:italic;
}

::-webkit-scrollbar{
width:6px;
}

::-webkit-scrollbar-thumb{
background:#2563eb;
border-radius:20px;
}
</style>

</head>
<body>

<div class="container">

<div class="header">
<h2>📚 Belajar AI</h2>

<select id="subject">
<option>Umum</option>
<option>Matematika</option>
<option>Bahasa Indonesia</option>
<option>Bahasa Inggris</option>
<option>Fisika</option>
<option>Kimia</option>
<option>Biologi</option>
<option>Sejarah</option>
<option>Informatika</option>
</select>

</div>

<div class="chat" id="chat">

<div class="ai">
Halo 👋<br><br>
Saya siap membantu belajar.<br>
Silakan tanyakan apa saja.
</div>

</div>

<div class="bottom">

<input
id="message"
type="text"
placeholder="Tulis pertanyaan..."
onkeypress="if(event.key==='Enter')sendMessage()">

<button onclick="sendMessage()">
Kirim
</button>

</div>

</div>

<script>

const API_KEY = AQ.Ab8RN6JQx2oTFjjkiWcdjfP16tvatAzfhOzzvwoJXCtFmtQ9KA;

const chat = document.getElementById("chat");

function addMessage(text,type){

let div=document.createElement("div");

div.className=type;

div.innerHTML=text;

chat.appendChild(div);

chat.scrollTop=chat.scrollHeight;

return div;

}

async function sendMessage(){

const input=document.getElementById("message");

const text=input.value.trim();

if(text=="") return;

addMessage(text,"user");

input.value="";

const loading=addMessage("Sedang berpikir...","ai loading");

try{

const response=await fetch("https://api.openai.com/v1/chat/completions",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+API_KEY
},

body:JSON.stringify({

model:"gpt-4.1-mini",

messages:[

{
role:"system",
content:"Kamu adalah guru profesional mata pelajaran "+document.getElementById("subject").value+". Jelaskan dengan bahasa Indonesia yang mudah dipahami. Jika ada soal, jelaskan langkah demi langkah."
},

{
role:"user",
content:text
}

]

})

});

const data=await response.json();

loading.classList.remove("loading");

if(data.error){

loading.innerHTML=data.error.message;

return;

}

loading.innerHTML=data.choices[0].message.content.replace(/\n/g,"<br>");

}catch(e){

loading.innerHTML="❌ Gagal terhubung ke AI.";

}

}

</script>

</body>
</html>
